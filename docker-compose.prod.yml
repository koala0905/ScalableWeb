version: "3.8"

services:
  web:
    build:
      context: ./web
      target: production
    # 注意：生產模式不要寫 ports: "3000:3000"，否則會造成 Port 衝突
    # 我們讓 Nginx 透過 Docker 內部網路存取 web:3000
    environment:
      - NODE_ENV=production
      - APP_NAME=Scale-Instance
    command: npm start
    # command: tail -f /dev/null

  nginx:
    image: nginx:1.29.1-alpine3.22-perl
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - web
